etl_template: :export
version: 2
file:
  type: insights.pay_grid_rep_assignments
  name: pay_grid_rep_assignments_{CCYYMMDDTHHMMSS}.txt
  format: :pipe 
description: Export pay grid rep assignment details for Insights

layout:
  header:
    tag: H
    date: CCYYMMDD
    include_file_type: true
  trailer:
    tag: T
    date: CCYYMMDD
    include_file_type: true
    include_trailer_date: true
    include_record_count: true
  include_column_names: true

  dataset:
    id: :default
    source: outbound.pay_grid_rep_assignment_tk
    columns:
      include: :all
      exclude:
      - id
