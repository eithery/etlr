etl_template: :import
version: 3
file:
  type: nfs.accounts
  format: :fixed-length

description: >
  The Name and Address Transmission file contains customer name and address information required to open
  and maintain a brokerage account on the Clearing and Custody platform.
  The file includes data such as the account registration details, account and customer level detail,
  interested parties, additional stakeholders and affiliations.

