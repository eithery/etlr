etl_template: :import
version: 2
file:
  type: std.fund_accounts
  format: :pipe

description: >
  Describes a standard BRACS records layout and processing workflow for fund accounts

layout:
  header:
    tag: H
    date: CCYYMMDD
    include_file_type: true
    include_file_version: true
  trailer:
    tag: T
    date: CCYYMMDD
    include_file_type: true
    include_record_count: true
  files:
    - std.fund_accounts:
        columns:
          - fund_account_number:
              size: 20
              required: true
              key: true
          - product_cusip:
              size: 9
              required: true
              key: true
              validate: true
          - rep_code:
              size: 10
              required: true
              validate: true
          - office_code:
              size: 10
              validate: true
          - division_code:
              size: 10
              validate: true
          - account_number:
              size: 20
              required: true
          - source_firm:
              size: 10
              validate: true
          - state_of_sale:
              type: :us_state
          - active:
              type: :bool
          - established_on:
              type: :date
          - closed_on:
              type: :date
          - group_plan_name:
              pii: :str
          - group_plan_alpha:
              size: 20
          - group_plan_ssn:
              size: 20
              pii: :ssn
          - last_position_amount:
              type: :money
          - last_position_source:
              size: 10
          - last_position_date:
              type: :date
          - last_commission_date:
              type: :date
          - lives_credit_date:
              type: :date
          - rollover_recommendation:
              type: :bool
          - rollover_recommended_on:
              type: :date
          - rollover_recommended_by:
              pii: :name
          - account_aum:
              type: :money
          - options:
              type: :bool
          - discretion:
              type: :bool
          - notes:
              size: :any

processing:
  staging: false
  update_strategy: delete_insert
  check_file_loaded: false

postprocess:
  stage_2:
    enabled: false

  stage_3:
    enabled: true
    default: false
    type: :python
    data_source: :bnr
    plugin: bnr/fund_accounts
