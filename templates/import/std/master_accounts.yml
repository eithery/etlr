etl_template: :import
version: 2
file:
  type: std.master_accounts
  format: :pipe

description: >
  Describes a standard BRACS records layout and processing workflow for master accounts and
  customers books & records info

layout:
  header:
    tag: H
    date: CCYYMMDD
    include_file_type: true
    include_file_version: true
  trailer:
    tag: T
    date: CCYYMMDD
    include_file_type: true
    include_record_count: true
  files:
    - std.customers:
        columns:
          - customer_type:
              size: 10
              type: :enum
              required: true
          - tax_id:
              size: 16
              type: :tax_id
              required: true
              key: true
          - tax_id_type:
              type: :enum
              required: true
              key: true
          - last_name:
          - first_name:
              size: 64
          - middle_name:
              size: 64
          - suffix:
              size: 16
          - gender:
              type: :ref
              validate: true
          - date_of_birth:
              type: :date
          - marital_status:
              type: :ref
              validate: true
          - dependents:
              type: :u8
          - personal_id_type:
              type: :ref
              validate: true
          - personal_id_number:
              size: 32
          - personal_id_issued_on:
              type: :date
          - personal_id_expires_on:
              type: :date
          - personal_id_state:
              type: :us_state
          - personal_id_country:
              type: :country
          - personal_id_verified:
              type: :bool
          - legal_residency:
              type: :ref
              validate: true
          - citizenship:
              type: :country
          - senior_political_figure:
              type: :bool
          - deceased:
              type: :bool
          - employment_status:
              type: :ref
              validate: true
          - income_source:
          - occupation:
          - employer:
          - nature_of_business:
          - employer_business_phone:
              type: :phone
          - employer_address_line_1:
              size: 96
          - employer_address_line_2:
              size: 96
          - employer_address_city:
              size: 64
          - employer_address_state:
              type: :us_state
          - employer_address_postal_code:
              size: 16
          - employer_address_country:
              type: :country
          - employer_finra_member:
              type: :bool
          - years_with_employer:
              type: :u8
          - entity_name:
          - legal_name:
          - business_description:
              size: :any
          - business_established_on:
              type: :date
          - incorporation_state:
              type: :us_state
          - incorporation_country:
              type: :country
          - business_state_id:
              size: 10
          - entity_identification_document:
              type: :ref
              validate: true
          - custodian_bank:
              type: :bool
          - government_entity:
              type: :bool
          - charitable_organization:
              type: :bool
          - legal_address_line_1:
              size: 96
          - legal_address_line_2:
              size: 96
          - legal_address_city:
              size: 64
          - legal_address_state:
              type: :us_state
          - legal_address_postal_code:
              size: 16
          - legal_address_country:
              type: :country
          - phone_number_1:
              type: :phone
          - phone_number_2:
              type: :phone
          - phone_number_3:
              type: :phone
          - email_address_1:
              type: :email
          - email_address_2:
              type: :email
          - email_address_3:
              type: :email
          - assets_held_away_amount:
              type: :money
          - assets_held_away_refused:
              type: :bool
          - last_cip_sent:
              type: :datetime
    - std.master_accounts:
        columns:
          - account_id:
          - account_number:
              size: 20
              required: true
              key: true
          - registration_type:
              type: :ref
              required: true
              validate: true
          - rep_code:
              size: 10
              required: true
              validate: true
          - office_code:
              size: 10
              validate: true
          - account_title:
              size: :any
          - risk_tolerance:
              type: :ref
              validate: true
          - risk_tolerance_comment:
          - investment_time_horizon:
              type: :ref
              validate: true
          - investment_time_horizon_comment:
          - withdrawal_timeframe:
              type: :ref
              validate: true
          - active:
              type: :bool
          - restricted:
              type: :bool
          - documents_in_good_order:
              type: :bool
          - established_on:
              type: :date
          - approved_on:
              type: :date
          - approver_code:
              size: 10
          - approver_name:
          - form_crs_date:
              type: :date
          - notes:
              size: :any
    - std.account_owners:
        columns:
          - account_id:
          - account_number:
              size: 20
              required: true
              key: true
          - tax_id:
              size: 16
              type: :tax_id
              required: true
              key: true
          - tax_id_type:
              type: :enum
              required: true
              key: true
          - registration_role:
              type: :ref
              required: true
              validate: true
          - mailing_address_line_1:
              size: 96
          - mailing_address_line_2:
              size: 96
          - mailing_address_city:
              size: 64
          - mailing_address_state:
              type: :us_state
          - mailing_address_postal_code:
              size: 16
          - mailing_address_country:
              type: :country
          - last_rap_sent:
              type: :datetime
          - last_nap_sent:
              type: :datetime
          - last_bnr_sent:
              type: :datetime
          - next_bnr_due:
              type: :date
          - privacy_mail_sent:
              type: :datetime
    - std.account_interested_parties:
        columns:
          - account_id:
          - account_number:
              size: 20
              required: true
              key: true
          - interested_party_type:
              type: :ref
              required: true
              validate: true
          - tax_id:
              size: 16
              type: :tax_id
          - tax_id_type:
              type: :enum
          - date_of_birth:
              type: :date
          - last_name:
          - first_name:
          - middle_name:
          - suffix:
              size: 16
          - title:
          - address_line_1:
              size: 96
          - address_line_2:
              size: 96
          - address_city:
              size: 64
          - address_state:
              type: :us_state
          - address_postal_code:
              size: 16
          - address_country:
              type: :country
          - finra_member:
              type: :bool
          - senior_political_figure:
              type: :bool
          - has_legal_age:
              type: :bool
          - beneficial_owner:
              type: :bool
          - ownership_percent:
              type: :u8
          - control_person:
              type: :bool
    - std.customer_financial_profile:
        columns:
          - tax_id:
              size: 16
              type: :tax_id
              required: true
              key: true
          - tax_id_type:
              type: :enum
              required: true
              key: true
          - category:
              type: :ref
              required: true
              validate: customer_financial_profile
          - level:
              type: :ref
          - amount:
              type: :money
          - percentage:
              type: :u8
          - note:
    - std.customer_investment_experience:
        columns:
          - tax_id:
              size: 16
              type: :tax_id
              required: true
              key: true
          - tax_id_type:
              type: :enum
              required: true
              key: true
          - category:
              type: :ref
              required: true
              validate: customer_investment_experience
          - experience_level:
              type: :ref
              validate: investment_experience_level
          - experience_in_years:
              type: :ref
              validate: investment_experience_in_years_level
          - total_years:
              type: :u8
          - since_year:
              type: :int
          - transactions_per_year:
              type: :ref
              validate: transactions_per_year_level
          - note:
    - std.customer_assets_held_away:
        columns:
          - tax_id:
              size: 16
              type: :tax_id
              required: true
              key: true
          - tax_id_type:
              type: :enum
              required: true
              key: true
          - category:
              type: :ref
              required: true
              validate: customer_assets_held_away
          - percentage:
              type: :u8
          - amount:
              type: :money
          - note:
    - std.customer_questions:
        columns:
          - tax_id:
              size: 16
              type: :tax_id
              required: true
              key: true
          - tax_id_type:
              type: :enum
              required: true
              key: true
          - question:
              type: :ref
              required: true
              validate: customer_question
          - logical_answer:
              type: :bool
          - qualified_answer:
          - secondary_answer:
    - std.account_investment_objectives:
        columns:
          - account_id:
          - account_number:
              size: 20
              required: true
              key: true
          - category:
              type: :ref
              required: true
              validate: account_investment_objective
          - rank:
              type: :u8
          - note:
    - std.account_investment_purposes:
        columns:
          - account_id:
          - account_number:
              size: 20
              required: true
              key: true
          - category:
              type: :ref
              required: true
              validate: account_investment_purpose
          - rank:
              type: :u8
          - note:
    - std.account_investment_strategies:
        columns:
          - account_id:
          - account_number:
              size: 20
              required: true
              key: true
          - category:
              type: :ref
              required: true
              validate: account_investment_strategy
          - note:
    - std.account_sources_of_funds:
        columns:
          - account_id:
          - account_number:
              size: 20
              required: true
              key: true
          - category:
              type: :ref
              required: true
              validate: account_source_of_funds
          - note:
    - std.account_questions:
        columns:
          - account_id:
          - account_number:
              size: 20
              required: true
              key: true
          - question:
              type: :ref
              required: true
              validate: account_question
          - logical_answer:
              type: :bool
          - qualified_answer:
          - secondary_answer:

processing:
  staging: false
  update_strategy: delete_insert
  check_file_loaded: false

postprocess:
  stage_2:
    enabled: false

  stage_3:
    enabled: true
    default: false
    type: :python
    data_source: :bnr
    plugin: bnr/master_accounts
