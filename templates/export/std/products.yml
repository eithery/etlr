etl_template: :export
version: 2
file:
  type: std.products
  name: products_{CCYYMMDDTHHMMSS}.txt
  format: :pipe
description: Export products data

layout:
  header:
    tag: H
    date: CCYYMMDD
    include_file_type: true
  trailer:
    tag: T
    date: CCYYMMDD
    include_file_type: true
    include_trailer_date: true
    include_record_count: true
  include_column_names: true

  dataset:
    id: :bnr
    source: outbound.products
    columns:
      include: :all
