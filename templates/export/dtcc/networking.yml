etl_template: :export
version: 2
file:
  type: dtcc.networking
  name: dtcc_networking_b5051_{CCYYMMDDTHHMMSS}.txt
  format: :fixed-length

description: >
  Networking is the U.S. industry standard for reconciling accounts and processing dividends and capital gains
  for mutual funds and other pooled investments. Networking streamlines the reconciliation of account records
  through efficient transmission of data between funds and intermediaries.
  The firm uses record type B50 to establish Networking account at the fund.
  Record type B51 allows the firm or fund to update existing Networking account.

