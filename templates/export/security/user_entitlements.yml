etl_template: :export
version: 2
file:
  type: security.user_entitlements
  name: user_entitlements_{CCYYMMDDTHHMMSS}.txt
  format: :pipe

description: Exports all SecureMe entitlements by user

layout:
  header:
    tag: H
    date: CCYYMMDD
    include_file_name: true
  trailer:
    tag: T
    date: CCYYMMDD
    include_file_name: true
    include_trailer_date: true
    include_record_count: true
  include_column_names: true

  dataset:
    id: :sec
    source: dbo.v_entitlements_by_user
    columns:
      include:
        - Login
        - Email: Email Address
        - FirstName: First Name
        - LastName: Last Name
        - EmployeeId: Employee ID
        - IsLocked: Locked
        - SsoOnly: SSO Only
        - CompanyName: Company
        - DepartmentName: Department
        - RootElementName: Application Name
        - EntitlementName: Entitlement Code
        - EntitlementDisplayName: Entitlement Name
        - EntitlementDescription: Entitlement Description
