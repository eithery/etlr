etl_template: :export
version: 2
file:
  type: bnr.product_issuers
  name: product_issuers_{CCYYMMDDTHHMMSS}.txt
  format: :pipe
description: Export carriers and NSCC issuers data

layout:
  header:
    tag: H
    date: CCYYMMDD
    include_file_type: true
  trailer:
    tag: T
    date: CCYYMMDD
    include_file_type: true
    include_trailer_date: true
    include_record_count: true
  include_column_names: true

  dataset:
    id: :bnr
    source: outbound.product_issuers
    columns:
      include: :all
